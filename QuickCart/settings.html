<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  position:relative;
}

/* BACK BUTTON */
.back-btn{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  cursor:pointer;
  transition:0.3s;
}

.back-btn:hover{
  transform:translateY(-50%) scale(1.1);
}

/* PROFILE SECTION */
.profile-box{
  background:white;
  margin:20px;
  padding:20px;
  border-radius:12px;
  display:flex;
  align-items:center;
  gap:15px;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.profile-img{
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ccc;
}

.profile-info h3{
  margin:0;
}

.profile-info p{
  margin:4px 0 0;
  font-size:14px;
  color:gray;
}

/* SETTINGS LIST */
.settings-container{
  margin:20px;
}

.setting-item{
  background:white;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 3px 8px rgba(0,0,0,0.05);
}

.setting-item:hover{
  transform:translateY(-3px);
}

.setting-left{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:15px;
}

.icon{
  font-size:18px;
}

/* LOGOUT BUTTON */
.logout{
  background:#ff4d4d;
  color:white;
  text-align:center;
  padding:14px;
  margin:20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.logout:hover{
  background:#e60000;
}

/* MOBILE */
@media(max-width:600px){
  .profile-box{
    margin:15px;
  }
  .settings-container{
    margin:15px;
  }
}
</style>
</head>
<body>

<div class="header">
  <span class="back-btn" onclick="goBack()">←</span>
  ⚙️ Settings
</div>

<!-- PROFILE -->
<div class="profile-box">
  <div class="profile-img"></div>
  <div class="profile-info">
    <h3>Ridam Mohanta</h3>
    <p>ridam@email.com</p>
  </div>
</div>

<!-- SETTINGS OPTIONS -->
<div class="settings-container">

  <div class="setting-item" onclick="redirect('profile.html')">
    <div class="setting-left">
      <span class="icon">👤</span>
      Edit Your Profile
    </div>
    <span>›</span>
  </div>

  <div class="setting-item" onclick="redirect('orders.html')">
    <div class="setting-left">
      <span class="icon">📦</span>
      Your Orders
    </div>
    <span>›</span>
  </div>

  <div class="setting-item" onclick="redirect('vendor-login.html')">
    <div class="setting-left">
      <span class="icon">🏪</span>
      Login as a Vendor
    </div>
    <span>›</span>
  </div>

  <div class="setting-item">
    <div class="setting-left">
      <span class="icon">💳</span>
      Payment Methods
    </div>
    <span>›</span>
  </div>

  <div class="setting-item">
    <div class="setting-left">
      <span class="icon">🔔</span>
      Notifications
    </div>
    <span>›</span>
  </div>

  <div class="setting-item">
    <div class="setting-left">
      <span class="icon">📞</span>
      Contact Us
    </div>
    <span>›</span>
  </div>

  <div class="setting-item">
    <div class="setting-left">
      <span class="icon">❓</span>
      Help & Support
    </div>
    <span>›</span>
  </div>

  <div class="setting-item">
    <div class="setting-left">
      <span class="icon">📜</span>
      Terms & Privacy Policy
    </div>
    <span>›</span>
  </div>

</div>

<div class="logout">
  Logout
</div>

<script>
function goBack(){
  window.history.back();
}

function redirect(page){
  window.location.href = page;
}
</script>

</body>
</html>

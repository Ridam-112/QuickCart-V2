<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Registration</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

.header{
  background:#111;
  color:white;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  position:relative;
}

.back-btn{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  cursor:pointer;
}

.form-container{
  background:white;
  width:90%;
  max-width:650px;
  margin:30px auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.section-title{
  margin:25px 0 10px;
  font-weight:bold;
  font-size:16px;
  border-bottom:1px solid #eee;
  padding-bottom:5px;
}

.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  outline:none;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:#111;
}

.submit-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  margin-top:10px;
}

.submit-btn:hover{
  background:#333;
}

.success-message{
  display:none;
  background:#d4edda;
  color:#155724;
  padding:12px;
  margin-top:15px;
  border-radius:8px;
  text-align:center;
  font-size:14px;
}

.checkbox{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
}
</style>
</head>
<body>

<div class="header">
  <span class="back-btn" onclick="goBack()">←</span>
  Vendor Registration
</div>

<div class="form-container">

<form id="vendorForm">

  <div class="section-title">Personal Details</div>

  <div class="form-group">
    <label>Shopkeeper Name</label>
    <input type="text" name="shopkeeperName" required>
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" name="phone" required>
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" name="email" required>
  </div>

  <div class="section-title">Shop Details</div>

  <div class="form-group">
    <label>Shop Name</label>
    <input type="text" name="shopName" required>
  </div>

  <div class="form-group">
    <label>Business Category</label>
    <select name="category" required>
      <option value="">Select Category</option>
      <option>Restaurant</option>
      <option>Garments</option>
      <option>Pharmacy</option>
      <option>Grocery</option>
      <option>Cosmetics</option>
      <option>Gadgets</option>
      <option>Furniture</option>
    </select>
  </div>

  <div class="section-title">Government Details</div>

  <div class="form-group">
    <label>GSTIN Number</label>
    <input type="text" name="gstin" required>
  </div>

  <div class="form-group">
    <label>PAN Number</label>
    <input type="text" name="pan" required>
  </div>

  <div class="form-group">
    <label>Aadhaar Number</label>
    <input type="text" name="aadhaar" required>
  </div>

  <div class="section-title">Bank & Payment Details</div>

  <div class="form-group">
    <label>Account Holder Name</label>
    <input type="text" name="accountHolderName" required>
  </div>

  <div class="form-group">
    <label>Bank Name</label>
    <input type="text" name="bankName" required>
  </div>

  <div class="form-group">
    <label>Account Number</label>
    <input type="text" name="accountNumber" required>
  </div>

  <div class="form-group">
    <label>IFSC Code</label>
    <input type="text" name="ifscCode" required>
  </div>

  <div class="form-group">
    <label>UPI ID</label>
    <input type="text" name="upiId" placeholder="example@upi" required>
  </div>

  <div class="form-group">
    <label>Upload Cancelled Cheque (Optional)</label>
    <input type="file" name="chequeFile">
  </div>

  <div class="section-title">Address</div>

  <div class="form-group">
    <label>Full Address</label>
    <textarea name="address" rows="3" required></textarea>
  </div>

  <div class="form-group">
    <label>Pincode</label>
    <input type="text" name="pincode" required>
  </div>

  <div class="form-group">
    <label>City</label>
    <input type="text" name="city" required>
  </div>

  <div class="form-group">
    <label>State</label>
    <input type="text" name="state" required>
  </div>

  <div class="form-group checkbox">
    <input type="checkbox" required>
    <label>I agree to the Terms & Vendor Policies</label>
  </div>

  <button type="submit" class="submit-btn">
    Submit for Approval
  </button>

  <div class="success-message" id="successMsg">
    ✅ Your approval request has been sent to Admin Panel.
  </div>

</form>

</div>

<script>
function goBack(){
  window.history.back();
}

document.getElementById("vendorForm").addEventListener("submit", function(e){
  e.preventDefault();

  // Future backend integration:
  // fetch("/api/vendor/register", {
  //   method: "POST",
  //   body: new FormData(this)
  // });

  document.getElementById("successMsg").style.display = "block";
  this.reset();
});
</script>

</body>
</html>

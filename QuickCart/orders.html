<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickCart - My Orders</title>

<style>

/* ================= GLOBAL ================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f2f4f7;
}

/* ================= NAVBAR ================= */

.navbar{
  display:flex;
  align-items:center;
  padding:15px 5%;
  gap:20px;
}

.location{
  background:rgba(255,255,255,0.35);
  backdrop-filter:blur(12px);
  padding:8px 16px;
  border-radius:20px;
  font-size:14px;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
  white-space:nowrap;
}

.search{
  flex:1;
  max-width:600px;
  height:44px;
  border:none;
  border-radius:22px;
  padding:0 20px;
  outline:none;
  box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

.icons{
  margin-left:auto;
  display:flex;
  gap:18px;
}

.icons span{
  font-size:22px;
  cursor:pointer;
}

/* ================= ORDERS ================= */

.orders-page{
  max-width:900px;
  margin:40px auto;
  padding:0 20px;
}

.order-card{
  background:white;
  padding:25px;
  border-radius:25px;
  box-shadow:0 8px 25px rgba(0,0,0,0.1);
  margin-bottom:25px;
}

.order-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

.order-id{
  font-weight:bold;
}

.status{
  padding:6px 14px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
}

/* Status Colors */
.preparing{
  background:#fff3cd;
  color:#856404;
}

.out{
  background:#d1ecf1;
  color:#0c5460;
}

.delivered{
  background:#d4edda;
  color:#155724;
}

.order-items{
  margin:10px 0;
  font-size:14px;
  color:#555;
}

.order-total{
  font-weight:bold;
  margin-top:10px;
}

.track-btn{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#7c5cff;
  color:white;
  cursor:pointer;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){
  .navbar{
    flex-direction:column;
    align-items:stretch;
  }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="icons">
    <span>🛒</span>
    <span>☰</span>
  </div>
</div>

<!-- ORDERS PAGE -->
<div class="orders-page">

  <h2 style="margin-bottom:20px;">My Orders</h2>

  <!-- ORDER 1 -->
  <div class="order-card">

    <div class="order-header">
      <div class="order-id">Order ID: QC102345</div>
      <div class="status preparing">Preparing</div>
    </div>

    <div class="order-items">
      Fresh Organic Apples (1kg) × 1 <br>
      Fresh Bananas (1 Dozen) × 2
    </div>

    <div class="order-total">
      Total: ₹259
    </div>

    <button class="track-btn">Track Order</button>

  </div>

  <!-- ORDER 2 -->
  <div class="order-card">

    <div class="order-header">
      <div class="order-id">Order ID: QC102120</div>
      <div class="status delivered">Delivered</div>
    </div>

    <div class="order-items">
      Fresh Tomatoes (1kg) × 2
    </div>

    <div class="order-total">
      Total: ₹98
    </div>

    <button class="track-btn">Track Order</button>

  </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:#f4f6f9;
}

/* LEFT SIDE */
.left{
  flex:1;
  background:#4a7ea8;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

.left h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:500;
}

.left img{
  width:250px;
  max-width:90%;
}

/* RIGHT SIDE */
.right{
  flex:1;
  background:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

.login-box{
  width:85%;
  max-width:400px;
}

.login-box h2{
  text-align:center;
  margin-bottom:25px;
  font-weight:bold;
  letter-spacing:1px;
}

.form-group{
  margin-bottom:18px;
}

label{
  font-size:14px;
  display:block;
  margin-bottom:6px;
}

input{
  width:100%;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
  outline:none;
  transition:0.3s;
}

input:focus{
  border-color:#4a7ea8;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#4a7ea8;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover{
  background:#3b6a8c;
}

#otpSection{
  display:none;
}

.register-link{
  text-align:center;
  margin-top:15px;
  font-size:14px;
}

.register-link a{
  color:#4a7ea8;
  text-decoration:none;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:768px){
  body{
    flex-direction:column;
  }
  .left{
    display:none;
  }
  .right{
    flex:unset;
    height:100vh;
  }
}
</style>
</head>
<body>

<!-- LEFT SIDE -->
<div class="left">
  <h2>Welcome Back Vendor!</h2>
  <p style="text-align:center;margin-bottom:20px;">
    Login to manage your shop, products & orders.
  </p>
  <img src="https://via.placeholder.com/250" alt="illustration">
</div>

<!-- RIGHT SIDE -->
<div class="right">
  <div class="login-box">

    <h2>LOGIN</h2>

    <form id="vendorLoginForm">

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" name="phone" required>
      </div>

      <button type="button" onclick="sendOTP()">Send OTP</button>

      <div id="otpSection">
        <div class="form-group">
          <label>Enter OTP</label>
          <input type="text" name="otp">
        </div>

        <button type="submit">Login</button>
      </div>

      <div class="register-link">
        Not a Vendor? 
        <a href="vednor.html">Register as New Vendor</a>
      </div>

    </form>

  </div>
</div>

<script>
function sendOTP(){
  document.getElementById("otpSection").style.display="block";

  // Later connect with backend:
  // fetch("/api/vendor/send-otp", { method:"POST" })
}

document.getElementById("vendorLoginForm").addEventListener("submit", function(e){
  e.preventDefault();

  // Later:
  // fetch("/api/vendor/verify-otp")

  alert("Login Successful (Approved Vendor)");
});
</script>

</body>
</html>

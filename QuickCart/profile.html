<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
.header{
  background:#111;
  color:white;
  padding:18px;
  text-align:center;
  font-size:20px;
  font-weight:bold;
  position:relative;
}

.back-btn{
  position:absolute;
  left:15px;
  top:50%;
  transform:translateY(-50%);
  font-size:22px;
  cursor:pointer;
}

/* PROFILE IMAGE */
.profile-section{
  text-align:center;
  margin-top:30px;
}

.profile-pic{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#ddd;
  object-fit:cover;
  cursor:pointer;
  border:4px solid #111;
  transition:0.3s;
}

.profile-pic:hover{
  transform:scale(1.05);
}

.change-text{
  margin-top:8px;
  font-size:14px;
  color:#555;
}

/* FORM */
.form-container{
  background:white;
  margin:30px auto;
  padding:25px;
  width:90%;
  max-width:450px;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  margin-bottom:6px;
  font-size:14px;
  color:#333;
}

.form-group input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:14px;
  outline:none;
  transition:0.3s;
}

.form-group input:focus{
  border-color:#111;
}

/* SAVE BUTTON */
.save-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#111;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.save-btn:hover{
  background:#333;
}

/* MOBILE */
@media(max-width:600px){
  .form-container{
    margin:20px;
  }
}
</style>
</head>
<body>

<div class="header">
  <span class="back-btn" onclick="goBack()">←</span>
  Edit Profile
</div>

<div class="profile-section">
  <input type="file" id="imageUpload" accept="image/*" hidden>
  <img src="https://via.placeholder.com/150" id="profileImage" class="profile-pic" onclick="uploadImage()">
  <div class="change-text">Tap to change photo</div>
</div>

<div class="form-container">

  <div class="form-group">
    <label>Full Name</label>
    <input type="text" placeholder="Enter your name">
  </div>

  <div class="form-group">
    <label>Phone Number</label>
    <input type="tel" placeholder="Enter phone number">
  </div>

  <div class="form-group">
    <label>Email Address</label>
    <input type="email" placeholder="Enter email">
  </div>

  <div class="form-group">
    <label>Location</label>
    <input type="text" placeholder="Enter location">
  </div>

  <div class="form-group">
    <label>Alternate Phone (Optional)</label>
    <input type="tel" placeholder="Alternate number">
  </div>

  <button class="save-btn" onclick="saveProfile()">Save Changes</button>

</div>

<script>
function goBack(){
  window.history.back();
}

function uploadImage(){
  document.getElementById("imageUpload").click();
}

document.getElementById("imageUpload").addEventListener("change", function(){
  const file = this.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = function(e){
      document.getElementById("profileImage").src = e.target.result;
    }
    reader.readAsDataURL(file);
  }
});

function saveProfile(){
  alert("Profile Updated Successfully ✅");
}
</script>

</body>
</html>
